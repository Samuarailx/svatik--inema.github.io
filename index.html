<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Топ фільмів та серіалів - Лук'яненко Святослав</title>
    <link rel="icon" type="image/x-icon" href="https://cdn-icons-png.flaticon.com/512/705/705062.png">
    
    <!-- Bootstrap та Іконки -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body {
            background-image: linear-gradient(rgba(0,0,0,0.85), rgba(0,0,0,0.85)), 
                              url('https://images.unsplash.com/photo-1485846234645-a62644f84728?q=80&w=1920');
            background-attachment: fixed;
            background-size: cover;
            color: #e0e0e0;
            font-family: sans-serif;
        }
        .btn-neon-trailer {
            background: transparent;
            border: 1px solid #ff0055;
            color: white;
            padding: 10px;
            margin-bottom: 5px;
            transition: 0.3s;
        }
        .btn-neon-trailer:hover { box-shadow: 0 0 15px #ff0055; }
        .btn-watch-now {
            background: #ff0055;
            border: none;
            color: white;
            padding: 10px;
            font-weight: bold;
        }
        .pointer { cursor: pointer; }
    </style>
</head>
<body>

<!-- Шапка сайту -->
<nav class="navbar navbar-expand-lg navbar-dark p-3" style="background: rgba(22, 22, 26, 0.9); border-bottom: 1px solid #ff0055;">
    <div class="container">
        <a class="navbar-brand fw-bold" href="index.html" style="color: #00fbff;">SVATIK-CINEMA</a>
        <div class="navbar-nav">
            <a class="nav-link active" href="index.html">Головна</a>
        </div>
    </div>
</nav>

<header class="container mt-5 text-center">
    <h1 style="color: #00fbff; font-weight: 900; text-transform: uppercase; letter-spacing: 2px;">
        Лук'яненко Святослав Русланович
    </h1>
    <div class="mt-4" style="max-width: 800px; margin: 0 auto;">
        <p style="font-size: 1.2rem;">Ласкаво просимо! Це мій особистий топ найкращих фільмів та серіалів.</p>
    </div>
</header>

<div class="container mt-5 mb-5">
    <!-- КАРТКА 1: Пуститися берега -->
    <div class="main-row align-items-start p-4 mb-4" style="background: #16161a; border-radius: 15px; border: 1px solid #2d2d35; display: flex;">
        <div class="poster-box" style="flex: 0 0 220px;">
            <img src="https://image.tmdb.org/t/p/w342/oVLZtMcIjouOXBA2nz9tJHqrK4A.jpg" class="img-fluid rounded-top shadow" alt="Постер">
            <button type="button" class="btn-neon-trailer w-100" data-bs-toggle="modal" data-bs-target="#trailerModal" data-video="https://www.youtube.com/embed/SvrAA90yBvc">ТРЕЙЛЕР</button>
            <button type="button" class="btn-watch-now w-100" data-bs-toggle="modal" data-bs-target="#authModal" data-movie="watch.html">ДИВИТИСЬ</button>
        </div>
        <div class="ms-4 flex-grow-1">
            <h2 class="h3 mb-1 fw-bold">Пуститися берега <span class="text-muted fw-light">(2008—2013)</span></h2>
            <div class="mb-3">
                <span class="badge border text-muted">18+</span>
                <span class="badge bg-primary-subtle text-primary border border-primary ms-2">Серіал</span>
            </div>
            <p class="text-secondary small">Історія про вчителя хімії Волтера Вайта.</p>
            <blockquote class="mt-4" style="border-left: 3px solid #00fbff; padding-left: 15px; font-style: italic;">"Я і є небезпека!"</blockquote>
        </div>
    </div>

    <!-- КАРТКА 2: Сім -->
    <div class="main-row align-items-start p-4 mb-4" style="background: #16161a; border-radius: 15px; border: 1px solid #2d2d35; display: flex;">
        <div class="poster-box" style="flex: 0 0 220px;">
            <img src="https://i.kinobaza.com.ua/w300/656962f1ad9fe.jpg" class="img-fluid rounded-top shadow" alt="Сім Постер">
            <button type="button" class="btn-neon-trailer w-100" data-bs-toggle="modal" data-bs-target="#trailerModal" data-video="https://www.youtube.com/embed/znmZoVkCjpI">ТРЕЙЛЕР</button>
            <button type="button" class="btn-watch-now w-100" data-bs-toggle="modal" data-bs-target="#authModal" data-movie="se7en.html">ДИВИТИСЬ</button>
        </div>
        <div class="ms-4 flex-grow-1">
            <h2 class="h3 mb-1 fw-bold">Сім <span class="text-muted fw-light">(1995)</span></h2>
            <p class="text-secondary small">Детектив про сім смертних гріхів.</p>
            <div class="atmosphere-video mt-3" style="max-width: 280px; border: 2px solid #00fbff; border-radius: 20px; overflow: hidden;">
                <video width="100%" height="auto" controls loop muted>
                    <source src="Video/Savetik_1778330628.mp4" type="video/mp4">
                </video>
            </div>
        </div>
    </div>
</div>

<!-- МОДАЛЬНЕ ВІКНО ТРЕЙЛЕРА -->
<div class="modal fade" id="trailerModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg modal-dialog-centered">
        <div class="modal-content bg-dark border-0">
            <div class="modal-header border-0 pb-0">
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body p-0">
                <div class="ratio ratio-16x9">
                    <iframe id="trailerVideo" src="" frameborder="0" allowfullscreen></iframe>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- МОДАЛЬНЕ ВІКНО РЕЄСТРАЦІЇ (ОСЬ ТУТ БУЛА ПОМИЛКА - ТЕПЕР ВИПРАВЛЕНО) -->
<div class="modal fade" id="authModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content text-white" style="background: #16161a; border: 2px solid #00fbff; border-radius: 20px;">
            <div class="modal-header border-0">
                <h5 class="modal-title" id="formTitle">Реєстрація</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body p-4">
                <form id="registrationForm">
                    <div class="mb-3" id="nameField">
                        <label class="form-label small">Ваше ім'я</label>
                        <input type="text" class="form-control bg-dark text-white border-secondary" id="userName" placeholder="Святослав">
                    </div>
                    <div class="mb-3">
                        <label class="form-label small">Електронна пошта</label>
                        <input type="email" class="form-control bg-dark text-white border-secondary" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label small">Пароль</label>
                        <input type="password" class="form-control bg-dark text-white border-secondary" required>
                    </div>
                    <button type="submit" id="submitBtn" class="btn btn-info w-100 fw-bold py-2 mt-3">
                        ПІДТВЕРДИТИ
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>

<!-- ПІДКЛЮЧЕННЯ СКРИПТІВ -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
document.addEventListener('DOMContentLoaded', function() {
    // 1. Логіка для Трейлерів (щоб відео зупинялося при закритті)
    const trailerModal = document.getElementById('trailerModal');
    const trailerVideo = document.getElementById('trailerVideo');
    
    trailerModal.addEventListener('show.bs.modal', function(event) {
        const button = event.relatedTarget;
        const videoUrl = button.getAttribute('data-video');
        trailerVideo.src = videoUrl;
    });

    trailerModal.addEventListener('hide.bs.modal', function() {
        trailerVideo.src = "";
    });

    // 2. Логіка для кнопок "Дивитись"
    const watchButtons = document.querySelectorAll('.btn-watch-now');
    
    watchButtons.forEach(button => {
        button.addEventListener('click', function(e) {
            const targetPage = this.getAttribute('data-movie');
            const isLoggedIn = localStorage.getItem('isUserLoggedIn');

            if (isLoggedIn === 'true') {
                e.preventDefault();
                window.location.href = targetPage;
            } else {
                localStorage.setItem('pendingMovie', targetPage);
            }
        });
    });

    // 3. Обробка форми
    const regForm = document.getElementById('registrationForm');
    if (regForm) {
        regForm.addEventListener('submit', function(e) {
            e.preventDefault();
            localStorage.setItem('isUserLoggedIn', 'true');
            const nextStep = localStorage.getItem('pendingMovie') || 'index.html';
            
            const btn = document.getElementById('submitBtn');
            btn.innerHTML = 'УСПІШНО! ПЕРЕХОДИМО...';
            btn.style.background = '#00ff88';

            setTimeout(() => {
                window.location.href = nextStep;
            }, 1000);
        });
    }
});
</script>
</body>
</html>
